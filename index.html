<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Maude HQ">
<meta name="theme-color" content="#f7f4ed">
<title>Maude HQ — Personal Assistant</title>
<style>
  :root{
    --bg:#f7f4ed; --panel:#fffefb; --ink:#241f19; --ink-soft:#6d675c; --ink-faint:#a49d8f;
    --line:#e9e4d8; --line-soft:#f1ede3;
    --work:#5157c9; --work-soft:#edeefc; --work-ink:#3d43b0;
    --personal:#2f9e8f; --personal-soft:#e5f4f1; --personal-ink:#217a6d;
    --high:#c2452d; --high-soft:#fbeae5;
    --amber:#b7791f; --amber-soft:#faf0da;
    --done:#8a877a;
    --grad:linear-gradient(120deg,#5157c9 0%,#7a5bd0 55%,#a75fc0 100%);
    --grad-soft:linear-gradient(120deg,#edeefc,#f4edfa);
    --radius:16px; --radius-sm:10px;
    --shadow:0 1px 2px rgba(45,38,26,.04),0 6px 20px rgba(45,38,26,.07);
    --shadow-lg:0 10px 40px rgba(45,38,26,.18);
    font-size:16px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:radial-gradient(1200px 600px at 75% -100px, #fdf6ea 0%, var(--bg) 55%); color:var(--ink); -webkit-font-smoothing:antialiased;
  }
  button{font:inherit;color:inherit;background:none;border:none;cursor:pointer}
  input,select,textarea{font:inherit;color:inherit}
  #app{display:flex;height:100vh;overflow:hidden}

  /* ---------- Sidebar ---------- */
  #sidebar{
    width:230px;flex:0 0 230px;background:var(--panel);border-right:1px solid var(--line);
    display:flex;flex-direction:column;padding:20px 14px 14px;gap:4px;overflow-y:auto;
  }
  .logo{font-size:1.25rem;font-weight:800;letter-spacing:-.02em;padding:2px 10px 14px}
  .logo span{background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent}
  .space-switch{display:flex;background:var(--line-soft);border-radius:10px;padding:3px;margin:0 6px 16px}
  .space-switch button{flex:1;padding:6px 0;border-radius:8px;font-size:.82rem;font-weight:600;color:var(--ink-soft);transition:all .15s}
  .space-switch button.on{background:#fff;box-shadow:var(--shadow);color:var(--ink)}
  .space-switch button.on.sw-work{color:var(--work-ink)}
  .space-switch button.on.sw-personal{color:var(--personal-ink)}
  .navbtn{
    display:flex;align-items:center;gap:10px;width:100%;text-align:left;
    padding:9px 12px;border-radius:10px;font-size:.95rem;font-weight:500;color:var(--ink-soft);
    transition:background .12s;
  }
  .navbtn:hover{background:var(--line-soft)}
  .navbtn.on{background:var(--grad-soft);color:var(--work-ink);font-weight:700;box-shadow:inset 0 0 0 1px rgba(81,87,201,.12)}
  .navbtn .ico{width:20px;text-align:center;font-size:1rem}
  .navbtn .cnt{margin-left:auto;font-size:.75rem;font-weight:700;background:var(--line-soft);color:var(--ink-soft);border-radius:20px;padding:2px 8px;min-width:24px;text-align:center}
  .navbtn.on .cnt{background:#fff}
  .navbtn .cnt.hot{background:var(--high-soft);color:var(--high)}
  .side-sep{height:1px;background:var(--line);margin:12px 8px}
  .side-foot{margin-top:auto;padding:12px 6px 0;display:flex;flex-direction:column;gap:6px}
  .side-foot .tiny-btn{font-size:.78rem;color:var(--ink-faint);padding:5px 8px;border-radius:8px;text-align:left}
  .side-foot .tiny-btn:hover{background:var(--line-soft);color:var(--ink-soft)}

  /* ---------- Main ---------- */
  #main{flex:1;overflow-y:auto;padding:34px 44px 90px}
  .view{max-width:760px;margin:0 auto}
  .view-head{margin-bottom:20px}
  .view-head h1{font-size:1.7rem;letter-spacing:-.03em;font-weight:750}
  .view-head .sub{color:var(--ink-soft);font-size:.95rem;margin-top:4px}

  /* ---------- Quick add ---------- */
  .quickadd{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:6px;margin-bottom:26px}
  .qa-row{display:flex;align-items:center;gap:8px}
  .qa-row input{flex:1;border:none;outline:none;padding:11px 12px;font-size:1rem;background:transparent}
  .qa-row .qa-go{background:var(--grad);color:#fff;border-radius:10px;padding:9px 18px;font-weight:650;font-size:.9rem;transition:transform .1s}
  .greet{margin-bottom:6px;font-size:2rem;font-weight:800;letter-spacing:-.035em;background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent}
  .pbar{height:6px;background:var(--line-soft);border-radius:6px;margin-top:12px;overflow:hidden;max-width:340px}
  .pbar>div{height:100%;background:var(--grad);border-radius:6px;transition:width .4s}
  .pbar-lbl{font-size:.78rem;color:var(--ink-faint);margin-top:5px}
  .pill.p-start{background:var(--grad-soft);color:var(--work-ink)}
  .draft-btn{font-size:.74rem;font-weight:700;border-radius:20px;padding:3.5px 12px;background:var(--grad-soft);color:var(--work-ink);cursor:pointer;transition:all .15s}
  .draft-btn:hover{filter:brightness(.96);transform:translateY(-1px)}
  .draft-btn.ready{background:var(--grad);color:#fff}
  #rk-list{display:flex;flex-direction:column;gap:6px;max-height:52vh;overflow-y:auto;touch-action:none}
  .rk-row{display:flex;gap:10px;align-items:center;background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:10px 12px;cursor:grab;user-select:none;transition:box-shadow .15s}
  .rk-row.rk-drag{box-shadow:var(--shadow-lg);border-color:var(--work);cursor:grabbing;z-index:5;position:relative}
  .rk-grip{color:var(--ink-faint);font-size:1rem}
  .bk-modal{max-width:820px !important;width:94vw}
  #bk-wrap{display:flex;flex-direction:column;gap:12px;max-height:62vh;overflow-y:auto}
  .bk-cols{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
  .bk-zone{min-height:70px;display:flex;flex-direction:column;gap:6px}
  .bk-zone.bk-tray{flex-direction:row;flex-wrap:wrap}
  .bk-zone.bk-tray .bk-card{flex:0 0 calc(33% - 6px)}
  .bk-sec.bu{background:linear-gradient(120deg,#f2efe7,#efece2);border:1.5px dashed var(--line)}
  .bk-sec.bk-over{outline:2px solid var(--work);outline-offset:2px}
  .bk-card.bu{border-left-color:var(--ink-faint)}
  .gs-log{display:flex;flex-direction:column;gap:8px;max-width:640px}
  .gs-q{background:var(--grad-soft);border-radius:14px 14px 14px 4px;padding:10px 14px;font-size:.92rem;max-width:85%}
  .gs-q.gs-live{box-shadow:var(--shadow);animation:gsin .35s ease}
  @keyframes gsin{0%{opacity:0;transform:translateY(6px)}100%{opacity:1;transform:none}}
  .gs-a{background:var(--panel);border:1px solid var(--line);border-radius:14px 14px 4px 14px;padding:10px 14px;font-size:.92rem;align-self:flex-end;max-width:85%;color:var(--ink-soft)}
  .wheel-wrap{position:relative;width:280px;height:280px;margin:0 auto;filter:drop-shadow(0 10px 24px rgba(43,40,34,.16))}
  .wheel-pointer{position:absolute;top:-17px;left:50%;transform:translateX(-50%);font-size:1.5rem;color:#c98f1b;z-index:3;text-shadow:0 2px 3px rgba(0,0,0,.25)}
  .wheel{width:280px;height:280px;border-radius:50%;position:relative;box-shadow:0 0 0 3px #e7c465, inset 0 0 0 6px #fff, inset 0 0 30px rgba(0,0,0,.10);overflow:hidden}
  .wheel-hub{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:58px;height:58px;border-radius:50%;background:linear-gradient(150deg,#fff,#f3eee1);box-shadow:0 2px 8px rgba(0,0,0,.22), inset 0 0 0 2px #e7c465;display:flex;align-items:center;justify-content:center;font-size:1.3rem;z-index:2;pointer-events:none}
  .wheel-lab{position:absolute;left:50%;top:50%;transform-origin:0 0;white-space:nowrap}
  .wheel-mystery{font-size:1.6rem;filter:drop-shadow(0 2px 3px rgba(0,0,0,.3))}
  .wheel-reveal{animation:prize .55s cubic-bezier(.2,1.4,.4,1)}
  .wheel-reveal .gift{display:inline-block;font-size:1.7rem;animation:giftwiggle .6s ease .1s}
  .wheel-prize{font-size:1.05rem;font-weight:800;margin-top:2px;background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent}
  @keyframes prize{0%{transform:scale(.3);opacity:0}70%{transform:scale(1.12)}100%{transform:scale(1);opacity:1}}
  @keyframes giftwiggle{0%,100%{transform:rotate(0)}25%{transform:rotate(-14deg)}50%{transform:rotate(12deg)}75%{transform:rotate(-7deg)}}
  .pill.p-pile0{background:#fdecec;color:#c2452d;font-weight:800}
  .pill.p-pile1{background:#fdf3dd;color:#c98f1b;font-weight:800}
  .pill.p-pile2{background:#e5f4f1;color:#2f9e8f;font-weight:800}
  #ext-sweep-btn .lbl::after{content:' ●';color:#d8b6ae;font-size:.6rem;vertical-align:1px}
  body.has-ext #ext-sweep-btn .lbl::after{color:#7fbfb4}
  .confetti{position:fixed;z-index:120;width:7px;height:7px;border-radius:2px;pointer-events:none;animation:confl .85s ease-out forwards}
  @keyframes confl{0%{transform:translate(0,0) rotate(0);opacity:1}100%{transform:translate(var(--dx),var(--dy)) rotate(240deg);opacity:0}}
  .bk-ghost{position:fixed;z-index:99;pointer-events:none;box-shadow:var(--shadow-lg);transform:rotate(2deg) scale(1.03);opacity:.95}
  @media(max-width:700px){.bk-cols{grid-template-columns:1fr}.bk-zone.bk-tray .bk-card{flex:1 1 100%}}
  .bk-sec{border-radius:14px;padding:10px 12px}
  .bk-sec.b0{background:linear-gradient(120deg,#fdecec,#fbe3df)}
  .bk-sec.b1{background:linear-gradient(120deg,#fdf3dd,#faeed2)}
  .bk-sec.b2{background:linear-gradient(120deg,#e5f4f1,#e0f0ee)}
  .bk-head{font-size:.8rem;font-weight:800;letter-spacing:.03em;margin-bottom:8px;color:var(--ink-soft)}
  .bk-head .n{color:var(--ink-faint);font-weight:700}
  .bk-card{background:#fff;border-radius:11px;padding:9px 13px;margin-bottom:6px;cursor:pointer;box-shadow:var(--shadow);border-left:4px solid transparent;transition:transform .12s, box-shadow .12s;user-select:none}
  .bk-card:hover{transform:translateY(-1px) scale(1.005);box-shadow:var(--shadow-lg)}
  .bk-card:active{transform:scale(.98)}
  .bk-card.b0{border-left-color:var(--high)}
  .bk-card.b1{border-left-color:var(--amber)}
  .bk-card.b2{border-left-color:var(--personal)}
  .bk-t{display:block;font-size:.9rem;font-weight:650}
  .bk-m{display:block;font-size:.72rem;font-weight:600;color:var(--ink-faint);margin-top:1px}
  .bk-empty{font-size:.78rem;color:var(--ink-faint);padding:6px 2px;font-style:italic}
  .rk-body{font-size:.9rem;font-weight:600;line-height:1.3}
  .rk-meta{display:block;font-size:.72rem;font-weight:600;color:var(--ink-faint);margin-top:1px}
  .later-box{margin-top:6px}
  .later-box summary{cursor:pointer;font-size:.88rem;font-weight:700;color:var(--ink-soft);padding:12px 14px;background:var(--panel);border:1.5px dashed var(--line);border-radius:var(--radius);list-style:none;transition:border-color .15s}
  .later-box summary::-webkit-details-marker{display:none}
  .later-box summary:hover{border-color:var(--ink-faint)}
  .later-box[open] summary{border-style:solid;margin-bottom:2px}
  .later-box summary .n{color:var(--ink-faint);font-weight:600}
  .gold-box summary{background:linear-gradient(120deg,#fdf6e0,#faefd0);border-color:#ecd9a0;color:#a97b14}
  .gold-box[open] summary{border-color:#ecd9a0}
  /* ---- day calendar canvas ---- */
  .dayv{position:relative;background:linear-gradient(180deg,#fffefb 0%,#fdfaf3 100%);border:1px solid var(--line);border-radius:20px;box-shadow:var(--shadow);padding:30px 16px 26px 0;overflow:hidden}
  .dayv-inner{position:relative;margin-left:64px;border-left:1.5px solid var(--line)}
  .hline{position:absolute;left:0;right:0;border-top:1px solid var(--line-soft);pointer-events:none}
  .hline.half{border-top-style:dashed;opacity:.35}
  .hlab{position:absolute;left:-54px;transform:translateY(-55%);font-size:.68rem;color:var(--ink-faint);font-weight:700;letter-spacing:.02em;opacity:.75;pointer-events:none;font-variant-numeric:tabular-nums}
  .nowline{position:absolute;left:-6px;right:0;height:2px;background:var(--high);z-index:6;pointer-events:none;box-shadow:0 0 6px rgba(194,69,45,.5)}
  .nowline::before{content:'';position:absolute;left:-5px;top:-4px;width:10px;height:10px;border-radius:50%;background:var(--high)}
  .now-t{position:absolute;left:-62px;top:-9px;font-size:.66rem;font-weight:800;color:#fff;background:var(--high);padding:2.5px 7px;border-radius:8px;font-variant-numeric:tabular-nums;box-shadow:0 1px 4px rgba(194,69,45,.4)}
  .dblk{position:absolute;left:8px;right:12px;border-radius:12px;padding:3px 13px;font-size:.84rem;line-height:1.25;display:flex;flex-direction:column;justify-content:center;font-weight:650;box-shadow:var(--shadow);overflow:hidden;background:#fff;border:1px solid var(--line);border-left:4px solid var(--amber);cursor:grab;touch-action:none;transition:box-shadow .15s;z-index:2}
  .dblk:hover{box-shadow:var(--shadow-lg);z-index:4}
  .dblk.dragging{opacity:.85;box-shadow:var(--shadow-lg);cursor:grabbing;z-index:9}
  .dblk.t-appt{background:linear-gradient(120deg,var(--work-soft),#f4eefb);border-left-color:var(--work);cursor:default;box-shadow:0 2px 10px rgba(81,87,201,.12)}
  .dblk.t-break{background:var(--personal-soft);border-left-color:var(--personal)}
  .dblk.t-done{opacity:.5}
  .dblk.t-done .dblk-t{text-decoration:line-through;color:var(--done)}
  .dblk.t-cancel{opacity:.45}
  .dblk.t-cancel .dblk-t{text-decoration:line-through}
  .dblk-t{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .dblk-sub{font-size:.68rem;font-weight:650;color:var(--ink-faint);font-variant-numeric:tabular-nums}
  .dblk-inline{font-size:.7rem;font-weight:800;color:var(--ink-faint);font-variant-numeric:tabular-nums}
  .dblk .blk-pill{font-size:.6rem;padding:1.5px 7px;vertical-align:1px}
  .dayv-hint{font-size:.75rem;color:var(--ink-faint);padding:10px 14px 4px 64px}
    .blk-pill{font-size:.66rem;font-weight:800;letter-spacing:.04em;text-transform:uppercase;border-radius:20px;padding:2px 8px;background:var(--work);color:#fff}
  .blk-pill.live{background:var(--high)}
  .blk-pill.next{background:transparent;color:var(--ink-faint);border:1px solid var(--line)}
  .dblk.t-live{box-shadow:0 0 0 2px var(--high), var(--shadow-lg)}
  .qa-row .qa-go:active{transform:scale(.96)}
  .qa-chips{display:flex;flex-wrap:wrap;gap:6px;padding:4px 8px 8px}
  .chip{font-size:.76rem;font-weight:600;border:1px solid var(--line);border-radius:20px;padding:4px 11px;color:var(--ink-soft);transition:all .12s}
  .chip:hover{border-color:var(--ink-faint)}
  .chip.on{border-color:transparent}
  .chip.on.c-work{background:var(--work-soft);color:var(--work-ink)}
  .chip.on.c-personal{background:var(--personal-soft);color:var(--personal-ink)}
  .chip.on.c-high{background:var(--high-soft);color:var(--high)}
  .chip.on.c-date{background:var(--line-soft);color:var(--ink)}
  .qa-hint{font-size:.72rem;color:var(--ink-faint);padding:0 10px 6px}

  /* ---------- Sections & cards ---------- */
  .sec{margin-bottom:26px}
  .sec-h{display:flex;align-items:baseline;gap:10px;margin-bottom:10px;padding:0 2px}
  .sec-h h2{font-size:.85rem;font-weight:750;text-transform:uppercase;letter-spacing:.06em;color:var(--ink-soft)}
  .sec-h h2.hot{color:var(--high)}
  .sec-h .n{font-size:.78rem;color:var(--ink-faint);font-weight:600}
  .cardlist{display:flex;flex-direction:column;gap:8px}

  .task{
    display:flex;align-items:flex-start;gap:12px;background:var(--panel);
    border:1px solid var(--line);border-radius:var(--radius);padding:14px 15px;
    box-shadow:var(--shadow);transition:opacity .25s, transform .18s, box-shadow .18s;
  }
  .task:hover{transform:translateY(-1.5px);box-shadow:var(--shadow-lg)}
  .task.focus-card{border-left:4px solid var(--amber)}
  .task.overdue-card{border-left:4px solid var(--high)}
  .task.done{opacity:.55}
  .task.done .t-title{text-decoration:line-through;color:var(--done)}
  .tickbox{position:relative;flex:0 0 32px;height:32px;margin-top:-2px;border:none;background:none;cursor:pointer;padding:0}
  .c-ring{position:absolute;inset:5px;border:2.2px solid #d6d0c0;border-radius:50%;background:#fff;transition:all .22s ease}
  .tickbox:hover .c-ring{border-color:#e6b93c;transform:scale(1.12);box-shadow:0 0 0 3px rgba(230,185,60,.15)}
  .c-star{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:1.5rem;line-height:1;
    transform:scale(0);transition:transform .22s ease;color:transparent;
    background:linear-gradient(140deg,#fce491 8%,#eebb35 35%,#c98f1b 62%,#fbe698 90%);
    -webkit-background-clip:text;background-clip:text;filter:drop-shadow(0 1px 3px rgba(201,143,27,.55));}
  .tickbox:hover .c-star{transform:scale(.55);opacity:.55}
  .task.done .c-ring{opacity:0;transform:scale(1.7)}
  .task.done .c-star{transform:scale(1)}
  @keyframes starpop{0%{transform:scale(1)}35%{transform:scale(1.7) rotate(-15deg)}65%{transform:scale(.9) rotate(6deg)}100%{transform:scale(1)}}
  .tickbox.pop .c-star{animation:starpop .55s ease}
  #clock .c-s{margin-top:4px;font-size:.82rem;font-weight:800;background:linear-gradient(140deg,#eebb35,#c98f1b);-webkit-background-clip:text;background-clip:text;color:transparent;filter:drop-shadow(0 1px 1px rgba(201,143,27,.3))}
  .t-body{flex:1;min-width:0}
  .t-title{font-size:.98rem;font-weight:550;line-height:1.35;word-wrap:break-word}
  .t-notes{font-size:.83rem;color:var(--ink-soft);margin-top:3px;line-height:1.4;white-space:pre-wrap}
  .t-meta{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
  .pill{font-size:.72rem;font-weight:650;border-radius:20px;padding:2.5px 9px;background:var(--line-soft);color:var(--ink-soft)}
  .pill.p-work{background:var(--work-soft);color:var(--work-ink)}
  .pill.p-personal{background:var(--personal-soft);color:var(--personal-ink)}
  .pill.p-high{background:var(--high-soft);color:var(--high)}
  .pill.p-over{background:var(--high-soft);color:var(--high)}
  .pill.p-today{background:var(--amber-soft);color:var(--amber)}
  .pill.p-wait{background:var(--amber-soft);color:var(--amber)}
  .t-actions{display:flex;gap:2px;flex:0 0 auto;opacity:0;transition:opacity .15s}
  .task:hover .t-actions{opacity:1}
  .t-actions button{padding:5px 7px;border-radius:8px;font-size:.9rem;color:var(--ink-faint)}
  .t-actions button:hover{background:var(--line-soft);color:var(--ink)}
  .t-actions .focus-btn,.t-actions .pin-btn{filter:grayscale(1)}
  .t-actions .focus-btn.on,.t-actions .pin-btn.on{filter:none;opacity:1}

  .empty{
    text-align:center;color:var(--ink-faint);padding:34px 20px;border:1.5px dashed var(--line);
    border-radius:var(--radius);font-size:.92rem;background:rgba(255,255,255,.4)
  }
  .empty .big{font-size:1.6rem;display:block;margin-bottom:8px}

  /* ---------- Focus banner ---------- */
  .focus-wrap{margin-bottom:26px}
  .focus-note{font-size:.8rem;color:var(--ink-faint);margin-top:8px;padding:0 2px}

  /* ---------- Calendar ---------- */
  .cal-top{display:flex;align-items:center;gap:12px;margin-bottom:14px}
  .cal-top h2{font-size:1.15rem;font-weight:700;letter-spacing:-.02em;min-width:170px}
  .cal-nav{display:flex;gap:4px}
  .cal-nav button{border:1px solid var(--line);background:var(--panel);border-radius:8px;padding:5px 12px;font-size:.85rem;font-weight:600;color:var(--ink-soft)}
  .cal-nav button:hover{color:var(--ink)}
  .cal-add{margin-left:auto;background:var(--ink);color:#fff;border-radius:10px;padding:8px 16px;font-weight:650;font-size:.85rem}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;background:transparent}
  .cal-dow{font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--ink-faint);text-align:center;padding:4px 0}
  .cal-cell{
    background:var(--panel);border:1px solid var(--line);border-radius:10px;min-height:86px;
    padding:6px;font-size:.78rem;cursor:pointer;transition:border-color .12s;overflow:hidden;
  }
  .cal-cell:hover{border-color:var(--ink-faint)}
  .cal-cell.dim{opacity:.38}
  .cal-cell.today{border-color:var(--work);border-width:2px}
  .cal-cell.sel{background:var(--work-soft);border-color:var(--work)}

'use strict';
/* ============ Maude HQ — core ============ */
const LS_KEY = 'maudehq_v1';
const $ = s => document.querySelector(s);

const uid = () => (crypto.randomUUID ? crypto.randomUUID() : Date.now() + '-' + Math.random().toString(36).slice(2));
const todayStr = () => new Date().toLocaleDateString('en-CA');

const NICE_DAY = d => {
  const t = todayStr();
  if (d === t) return 'Today';
  if (d === addDaysStr(t, 1)) return 'Tomorrow';
  if (d === addDaysStr(t, -1)) return 'Yesterday';
  return new Date(d + 'T12:00:00').toLocaleDateString('en-GB', { weekday: 'short', day: 'numeric', month: 'short' });
};
const dueLabel = d => {
  const t = todayStr();
  if (!d) return null;
  if (d < t) { const n = Math.round((new Date(t) - new Date(d)) / 864e5); return { txt: n === 1 ? '1 day late' : n + ' days late', cls: 'p-over' }; }
  if (d === t) return { txt: 'Today', cls: 'p-today' };
  if (d === addDaysStr(t, 1)) return { txt: 'Tomorrow', cls: '' };
  return { txt: NICE_DAY(d), cls: '' };
};

/* ---------- state ---------- */
let DB = null;
function defaultDB() { return { tasks: [], events: [], settings: { space: 'all', route: 'today', seeded: false } }; }
function load() {
  try { DB = JSON.parse(localStorage.getItem(LS_KEY)) || defaultDB(); }
  catch (e) { DB = defaultDB(); }
  if (!DB.settings) DB.settings = defaultDB().settings;
  if (!DB.settings.seeded) { seed(); DB.settings.seeded = true; save(); }
  if (!DB.settings.seedV2) { seedV2(); DB.settings.seedV2 = true; save(); }
  if (!DB.settings.seedV3) { seedV3(); DB.settings.seedV3 = true; save(); }
  if (!DB.settings.seedV4) { seedV4(); DB.settings.seedV4 = true; save(); }
  if (!DB.settings.estFill1) { DB.settings.estFill1 = true; DB.tasks.forEach(x => { if (!x.est) x.est = guessEstG(x.title); }); save(); }
  if (!DB.settings.repack1) {
    DB.settings.repack1 = true;
    if (DB.dayplan && DB.dayplan.blocks) DB.dayplan.blocks = DB.dayplan.blocks.filter(b => b.type !== 'task' || b.userFixed || b.done || b.cancelled);
    DB.settings.dpAutoDate = '';
    save();
  }
  if (!DB.settings.titles1) {
    DB.settings.titles1 = true;
    DB.events.forEach(e => { e.title = e.title.replace(/^#\S+\s*[—-]\s*/, ''); });
    if (DB.dayplan && DB.dayplan.blocks) {
      DB.dayplan.blocks.forEach(b => { b.title = String(b.title).replace(/^#\S+\s*[—-]\s*/, ''); });
      const seenB = {};
      DB.dayplan.blocks = DB.dayplan.blocks.filter(b => {
        if (b.type !== 'task') return true;
        const k = b.title.toLowerCase();
        if (seenB[k]) { return false; }
        seenB[k] = true; return true;
      });
    }
    save();
  }
  if (!DB.settings.dedupe1) {
    DB.settings.dedupe1 = true;
    const seen = {};
    DB.events = DB.events.filter(e => {
      const key = e.category === 'patient' ? ('P|' + e.date + '|' + (e.time || '')) : (e.title.toLowerCase() + '|' + e.date + '|' + (e.time || ''));
      if (seen[key]) return false;
      seen[key] = true; return true;
    });
    save();
  }
  if (!DB.settings.scrub1) {
    DB.settings.scrub1 = true;
    DB.tasks.forEach(x => { if (x.draft) x.draft = sanitizeAI(x.draft); if (x.notes) x.notes = sanitizeAI(x.notes); if (x.context) x.context = sanitizeAI(x.context); (x.steps || []).forEach(st => st.txt = sanitizeAI(st.txt)); });
    if (DB.settings.style && DB.settings.style.indexOf('[' + 'CHECK') > -1) DB.settings.style = '';
    save();
  }
  const rmap = { upcoming: 'plan', calendar: 'plan', all: 'tasks', waiting: 'tasks', done: 'tasks' };
  if (rmap[DB.settings.route]) DB.settings.route = rmap[DB.settings.route];
  /* purge any AI-invented junk that older versions let into the day plan */
  if (DB.dayplan && DB.dayplan.blocks) {
    DB.dayplan.blocks = DB.dayplan.blocks.filter(b =>
      b.userFixed || b.patient || String(b.id).startsWith('ev-') || b.done ||
      (b.start >= '10:00' && b.start < '20:30' && !/morning routine|sleep|wake|catch-up|consultations & admin|admin & catch/i.test(b.title) && !/^\s*(break|breather)\s*$/i.test(b.title)));
    save();
  }
}
/* extra context learned from WhatsApp/Calendar, 8 Jul — only fills empty notes */
function seedV4() {} /* fresh devices start empty — real data arrives via private sync */
function save() { DB.updatedAt = Date.now(); localStorage.setItem(LS_KEY, JSON.stringify(DB)); schedSync(); }

/* ---------- device sync (private GitHub Gist) ---------- */
const GIST_DESC = 'Maude HQ data (private)';
const ghHdr = tk => ({ 'Authorization': 'Bearer ' + tk, 'Accept': 'application/vnd.github+json', 'Content-Type': 'application/json' });
function syncCopy() { const c = JSON.parse(JSON.stringify(DB)); if (c.settings) { delete c.settings.ghToken; delete c.settings.apiKey; delete c.settings.gistId; delete c.settings.oaiKey; } return c; }
async function ensureGist() {
  const tk = DB.settings.ghToken; if (!tk || DB.settings.gistId) return;
  try {
    const r = await fetch('https://api.github.com/gists?per_page=100', { headers: ghHdr(tk) });
    const list = await r.json();
    const g = Array.isArray(list) && list.find(x => x.description === GIST_DESC);
    if (g) { DB.settings.gistId = g.id; localStorage.setItem(LS_KEY, JSON.stringify(DB)); }
  } catch (e) {}
}
const dataWeight = db => ((db && db.tasks) || []).length + ((db && db.events) || []).length;
async function syncPull() {
  const tk = DB.settings.ghToken; if (!tk) return;
  await ensureGist(); if (!DB.settings.gistId) return;
  try {
    const r = await fetch('https://api.github.com/gists/' + DB.settings.gistId, { headers: ghHdr(tk) });
    const j = await r.json();
    const f = j.files && j.files['maudehq.json']; if (!f) return;
    const remote = JSON.parse(f.truncated ? await (await fetch(f.raw_url)).text() : f.content);
    const newer = (remote.updatedAt || 0) > (DB.updatedAt || 0);
    const remoteHasData = dataWeight(remote) > 0, iAmEmpty = dataWeight(DB) === 0;
    /* an empty device never outranks real data, whatever the clocks say */
    if ((newer && !(dataWeight(remote) === 0 && !iAmEmpty)) || (iAmEmpty && remoteHasData)) {
      const keep = { ghToken: DB.settings.ghToken, gistId: DB.settings.gistId, apiKey: DB.settings.apiKey };
      DB = remote; DB.settings = Object.assign(DB.settings || {}, keep);
      localStorage.setItem(LS_KEY, JSON.stringify(DB)); render();
      toast('☁ Synced from your other device ✓');
    }
  } catch (e) {}
}
let syncTimer = null, syncState = DB && DB.settings && DB.settings.ghToken ? 'on' : 'off';
function schedSync() { if (!DB.settings.ghToken) return; clearTimeout(syncTimer); syncTimer = setTimeout(syncPush, 1500); }
async function syncPush() {
  const tk = DB.settings.ghToken; if (!tk) return;
  try {
    const body = { files: { 'maudehq.json': { content: JSON.stringify(syncCopy()) } } };
    if (!DB.settings.gistId) {
      await ensureGist();
      if (!DB.settings.gistId) {
        const r = await fetch('https://api.github.com/gists', { method: 'POST', headers: ghHdr(tk), body: JSON.stringify({ description: GIST_DESC, public: false, ...body }) });
        const j = await r.json();
        if (j.id) { DB.settings.gistId = j.id; localStorage.setItem(LS_KEY, JSON.stringify(DB)); toast('☁ Sync is on — add the same code on your phone'); }
        return;
      }
    }
    if (dataWeight(DB) === 0) { await syncPull(); if (dataWeight(DB) > 0) return; } /* empty device: take the cloud copy, never erase it */
    await fetch('https://api.github.com/gists/' + DB.settings.gistId, { method: 'PATCH', headers: ghHdr(tk), body: JSON.stringify(body) });
  } catch (e) {}
}
/* drafts pre-loaded by Claude, 8 Jul — attach to matching tasks */
function seedV3() {} /* fresh devices start empty — real data arrives via private sync */
/* save() lives below, next to the sync engine */

/* ---------- task helpers ---------- */
const inSpace = t => DB.settings.space === 'all' || t.space === DB.settings.space;
const openTasks = () => DB.tasks.filter(t => t.status !== 'done' && inSpace(t));
const prioRank = { high: 0, med: 1, low: 2 };
function sortTasks(arr) {
  return arr.slice().sort((a, b) =>
    (a.due || '9999') < (b.due || '9999') ? -1 : (a.due || '9999') > (b.due || '9999') ? 1 :
    prioRank[a.priority] - prioRank[b.priority] || a.createdAt - b.createdAt);
}
function getTask(id) { return DB.tasks.find(t => t.id === id); }
function getEvent(id) { return DB.events.find(e => e.id === id); }

let lastDone = null;
function toggleDone(id) {
  const t = getTask(id); if (!t) return;
  if (t.status === 'done') { t.status = 'open'; t.doneAt = null; }
  else {
    t.status = 'done'; t.doneAt = Date.now(); t.focus = false; lastDone = id;
    const card = document.querySelector('.task[data-id="' + id + '"]');
    if (card) {
      card.classList.add('done');
      const st = card.querySelector('.tickbox');
      if (st) {
        st.classList.add('pop');
        try { const r = st.getBoundingClientRect(); if (r.width) burst(r.left + r.width / 2, r.top + r.height / 2, 12); } catch (e) {}
      }
      save();
      if (t.repeat) { /* handled below on re-render */ }
      setTimeout(() => render(), 620);
    }
    if (t.repeat) {
      const base = t.due && t.due > todayStr() ? t.due : todayStr();
      const next = t.repeat === 'daily' ? addDaysStr(base, 1) : t.repeat === 'weekly' ? addDaysStr(base, 7) : addDaysStr(base, 30);
      DB.tasks.push({ ...t, id: uid(), status: 'open', doneAt: null, due: next, createdAt: Date.now() });
    }
    const left = DB.tasks.filter(x => x.status !== 'done' && x.due && x.due <= todayStr()).length;
    const stars = DB.tasks.filter(x => x.status === 'done' && x.doneAt && new Date(x.doneAt).toLocaleDateString('en-CA') === todayStr()).length;
    const milestone = stars === 3 ? '⭐⭐⭐ Hat-trick!' : stars === 5 ? '⭐ Five today — you’re flying' : stars === 8 ? '⭐ Eight?! Save some for tomorrow' : null;
    toast(left === 0 ? '⭐ Star earned — that’s everything for today! 🎉' : (milestone || '⭐ Star earned! ' + stars + ' today'), true);
    save(); if (!document.querySelector('.task[data-id="' + id + '"]')) render();
    if (window._ctick) window._ctick();
    return;
  }
  save(); render();
}
function undoDone() { if (lastDone) { const t = getTask(lastDone); if (t) { t.status = 'open'; t.doneAt = null; } lastDone = null; save(); render(); } }
function snooze(id, days) { const t = getTask(id); if (!t) return; t.due = addDaysStr(t.due && t.due > todayStr() ? t.due : todayStr(), days); save(); render(); toast('Snoozed to ' + NICE_DAY(t.due)); }
function toggleFocus(id) {
  const t = getTask(id); if (!t) return;
  if (!t.focus && DB.tasks.filter(x => x.focus && x.status !== 'done').length >= 3) { toast('Focus is full — max 3. Finish or untarget one first.'); return; }
  t.focus = !t.focus; save(); render();
}
function toggleWait(id) { const t = getTask(id); if (!t) return; t.status = t.status === 'waiting' ? 'open' : 'waiting'; save(); render(); }

/* ---------- toast ---------- */
function toast(msg, undoable) {
  const root = $('#toast-root');
  const el = document.createElement('div'); el.className = 'toast';
  el.innerHTML = esc(msg) + (undoable ? ' <button>Undo</button>' : '');
  if (undoable) el.querySelector('button').onclick = () => { undoDone(); el.remove(); };
  root.appendChild(el);

}

/* ---------- quick add parsing ---------- */
const qaState = { space: null, pri: null, due: null };
function parseQuick(text) {
  let title = text;
  const out = { space: qaState.space, priority: qaState.pri || 'med', due: qaState.due || '', tag: '' };
  const tagm = title.match(/#(\w[\w-]*)/); if (tagm) { out.tag = tagm[1]; title = title.replace(tagm[0], ''); }
  if (/@work\b/i.test(title)) { out.space = 'work'; title = title.replace(/@work\b/i, ''); }
  if (/@personal\b/i.test(title)) { out.space = 'personal'; title = title.replace(/@personal\b/i, ''); }
  if (/!high\b|!!/i.test(title)) { out.priority = 'high'; title = title.replace(/!high\b|!!/i, ''); }
  if (/\b(urgent|urgently|asap|important|priority)\b/i.test(title)) { out.priority = 'high'; }
  if (/!low\b/i.test(title)) { out.priority = 'low'; title = title.replace(/!low\b/i, ''); }
  const t = todayStr();
  const words = [[/\btoday\b/i, 0], [/\btomorrow\b|\btmrw\b/i, 1], [/\bnext week\b/i, 7]];
  for (const [re, n] of words) if (re.test(title)) { out.due = addDaysStr(t, n); title = title.replace(re, ''); }
  const daym = title.match(/\b(mon|tue|wed|thu|fri|sat|sun)(day|sday|nesday|rsday|urday)?\b/i);
  if (daym && !out.due) {
    const idx = ['sun', 'mon', 'tue', 'wed', 'thu', 'fri', 'sat'].indexOf(daym[1].toLowerCase().slice(0, 3));
    const now = new Date(); let diff = (idx - now.getDay() + 7) % 7; if (diff === 0) diff = 7;
    out.due = addDaysStr(t, diff); title = title.replace(daym[0], '');
  }
  const dm = title.match(/\b(\d{1,2})\/(\d{1,2})(?:\/(\d{2,4}))?\b/);
  if (dm && !out.due) {
    const y = dm[3] ? (dm[3].length === 2 ? '20' + dm[3] : dm[3]) : String(new Date().getFullYear());
    out.due = y + '-' + dm[2].padStart(2, '0') + '-' + dm[1].padStart(2, '0');
    title = title.replace(dm[0], '');
  }
  out.title = title.replace(/\s+/g, ' ').trim();
  if (!out.space) out.space = DB.settings.space === 'personal' ? 'personal' : 'work';
  return out;
}
function quickAdd() {
  const inp = $('#qa-input'); if (!inp || !inp.value.trim()) return;
  const p = parseQuick(inp.value);
  if (!p.title) { toast('Give the task a name first'); return; }
  DB.tasks.push({ id: uid(), title: p.title, notes: '', space: p.space, tag: p.tag, priority: p.priority, due: p.due, est: guessEstG(p.title), status: 'open', focus: false, repeat: '', createdAt: Date.now(), doneAt: null });
  inp.value = ''; qaState.space = null; qaState.pri = null; qaState.due = null;
  save(); render(); toast('Added ✓');
  const ni = $('#qa-input'); if (ni) ni.focus();
}

/* ---------- AI drafting ---------- */
const DEFAULT_STYLE = `You write email drafts AS Maude Calveley, an aesthetics doctor at Ouronyx London. Mimic her real voice exactly, learned from her sent emails.

HER VOICE:
- Greetings: "Good Morning [Name]," or "Good Afternoon [Name]," for patients/external contacts; "Hi [Name]," for colleagues she knows.
- Warm but brisk openers she actually uses: "I hope you are well", "I hope you had a good weekend", "Many thanks for your email", "Thank you for reaching out". Vary them; sometimes none at all for quick internal replies.
- Short, direct paragraphs. Asks questions plainly ("I was hoping you could help me"). Uses "Please find attached/below...".
- Occasional light exclamation mark for warmth ("not sure what happened there!"). Natural apologies ("Apologies for the delay in sending this through").
- Conversational glue: "Unless I am missing something...", "But I will await her feedback/input.".
- Closings: "Kind Regards,\\nMaude" for formal/external; "Thanks,\\nMaude" or just "Thank you" for quick/internal ones.
- UK spelling throughout. Clinically precise when medical content is involved, plain English with patients.

PRESS & CAREER STANDARD: anything tagged press or marketing is publication-grade and career-facing. Every clinical claim must be current, defensible and evidence-based; every market claim aware of what competitors and other clinics are saying. If unsure of a fact, trend or study, verify with a web search before asserting it — never publish a guess. Quotable, precise, zero filler, no hedging waffle; sub-editor quality where every sentence earns its place.

HARD RULES:
- Never use em dashes.
- Never write "I hope this email finds you well", "I'd be delighted", "Please don't hesitate", "I trust this...", or any stock corporate/AI phrasing she doesn't use.
- No bullet points unless she'd genuinely list items (e.g. a treatment plan). No headings. No bold.
- Never mention AI, drafting, or assistants. Output must be indistinguishable from Maude typing it herself.
- For anything clinical (doses, treatment specifics), phrase generally or leave the specific out entirely. NEVER insert placeholders, square brackets or blanks of any kind. Never use em dashes anywhere, use commas or hyphens.
- Output ONLY the email body, ready to paste. No subject line, no commentary.`;

async function generateDraft(taskId, sourceText, extra) {

  if (!key) { toast('Add your API key in AI settings first'); return; }

    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'content-type': 'application/json', 'x-api-key': key, 'anthropic-version': '2023-06-01', 'anthropic-dangerous-direct-browser-access': 'true' },
      body: JSON.stringify({
        model: DB.settings.model || 'claude-sonnet-5', max_tokens: 1600,
        ...((t.tag === 'press' || t.tag === 'marketing') ? { tools: [{ type: 'web_search_20250305', name: 'web_search', max_uses: 2 }] } : {}),
        system: (DB.settings.style || DEFAULT_STYLE) + peopleNotes(t.title + ' ' + (t.notes || '') + ' ' + (t.context || '') + ' ' + (sourceText || '')),
        messages: [{ role: 'user', content: 'Task on my list: "' + t.title + '"' + (t.notes ? '\nContext notes: ' + t.notes : '') + (sourceText ? '\n\nThe message I am replying to:\n"""\n' + sourceText + '\n"""' : '') + (extra ? '\n\nExtra instructions: ' + extra : '') + '\n\nWrite the reply/email now.' }]
      })
    });

    if (j.error) throw new Error(j.error.message || 'API error');
    const txt = sanitizeAI((j.content || []).map(c => c.text || '').join('').trim());

    t.draft = txt; save(); toast('Draft ready ✓ — read it before you use it');
  } catch (e) { toast(netErrMsg(e)); }

}
function netErrMsg(e) {
  const m = (e && e.message) || '';

    if (location.protocol === 'file:' && /safari/i.test(navigator.userAgent) && !/chrome/i.test(navigator.userAgent))
      return 'Safari blocks this for local files. Open the app in Chrome instead: right-click the file → Open With → Google Chrome. (Once the app is hosted online, any browser works.)';
    return 'Your browser blocked the request — usually an extension (ad-blocker, Grammarly) or privacy setting. Try Chrome with extensions off for this page, or an incognito window. This disappears for good once the app is hosted online.';
  }
  if (/invalid x-api-key|authentication/i.test(m)) return 'The API key wasn’t accepted — re-copy it from console.anthropic.com and paste it again in Settings.';
  if (/credit|billing/i.test(m)) return 'Your API account needs credit — add a little at console.anthropic.com → Billing.';

function importDraftPack(file) {

}
function applyUpdatesText(text) {
    try {
      const j = JSON.parse(text);
      snapImport();
      let drafts = 0, tasks = 0, events = 0, notes = 0;
      const applyDraft = d => { const t = DB.tasks.find(x => x.status !== 'done' && x.title.toLowerCase().includes(String(d.match).toLowerCase())); if (t && d.text) { t.draft = d.text; drafts++; } };
      if (Array.isArray(j)) j.forEach(applyDraft);
      else {
        (j.tasks || []).forEach(nt => {
          if (!nt.title) return;
          const existing = DB.tasks.find(x => x.title.toLowerCase() === nt.title.toLowerCase());
          ['notes', 'draft', 'context'].forEach(k => { if (nt[k]) nt[k] = sanitizeAI(nt[k]); });
          const mkSteps = arr => (Array.isArray(arr) ? arr : []).map(s => ({ txt: sanitizeAI(s), done: false }));
          if (existing) { if (nt.notes && !existing.notes) { existing.notes = nt.notes; notes++; } if (nt.draft && !existing.draft) { existing.draft = nt.draft; drafts++; } if (nt.context && !existing.context) existing.context = nt.context; if (nt.steps && !(existing.steps || []).length) existing.steps = mkSteps(nt.steps); return; }
          DB.tasks.push({ id: uid(), title: nt.title, notes: nt.notes || '', space: nt.space || 'work', tag: nt.tag || '', priority: nt.priority || 'med', due: nt.due || '', startBy: nt.startBy || '', est: nt.est || 0, status: 'open', focus: false, repeat: nt.repeat || '', steps: mkSteps(nt.steps), draft: nt.draft || '', context: nt.context || '', createdAt: Date.now(), doneAt: null });
          tasks++;
        });
        (j.events || []).forEach(ne => {
          if (!ne.title || !ne.date) return;
          /* confidentiality: client numbers live in notes, never in titles */
          const num = String(ne.title).match(/\d{3,}/);
          if (num) { ne.title = scrubEvTitle(ne.title) || ne.title; if (!(ne.notes || '').includes(num[0])) ne.notes = ((ne.notes ? ne.notes + ' ' : '') + 'Client #' + num[0]).trim(); }
          if (DB.events.some(x => x.title.toLowerCase() === ne.title.toLowerCase() && x.date === ne.date && (x.time || '') === (ne.time || ''))) return;
          /* one appointment slot cannot hold two patient events — merge instead of duplicating */
          const clash = ne.time && DB.events.find(x => x.date === ne.date && x.time === ne.time && (x.category === 'patient' || ne.category === 'patient'));
          if (clash) { if (num && !(clash.notes || '').includes(num[0])) { clash.notes = ((clash.notes ? clash.notes + ' ' : '') + 'Client #' + num[0]).trim(); } return; }
          DB.events.push({ id: uid(), title: ne.title, date: ne.date, time: ne.time || '', endTime: ne.endTime || '', space: ne.space || 'personal', category: ne.category || 'other', location: ne.location || '', notes: ne.notes || '' });
          events++;
        });
        (j.drafts || []).forEach(applyDraft);
      }
      save(); render();
      const bits = [];
      if (tasks) bits.push(tasks + ' new task' + (tasks > 1 ? 's' : ''));
      if (events) bits.push(events + ' diary item' + (events > 1 ? 's' : ''));
      if (drafts) bits.push(drafts + ' draft' + (drafts > 1 ? 's' : ''));
      if (notes) bits.push(notes + ' context note' + (notes > 1 ? 's' : ''));
      toast(bits.length ? 'Loaded in: ' + bits.join(', ') + ' ✓' : 'Nothing new to load — you’re up to date ✓');
      /* new work arrived → quietly rebuild the day plan around it */
      if ((tasks || events) && DB.settings.apiKey) setTimeout(() => buildDayPlan(), 900);
    } catch (e) { toast('That didn’t look like updates from Claude'); }
}

    const time = ds.includes('T') ? ds.slice(9, 11) + ':' + ds.slice(11, 13) : '';
    const end = de && de.includes('T') ? de.slice(9, 11) + ':' + de.slice(11, 13) : '';
    /* anonymise: capitalised name words → initials, keep the appointment type */
    const parts = sum.split(/\s[–—-]\s|:\s/);
    const namey = parts[0].trim(); const type = parts.slice(1).join(' — ').trim();
    const initials = namey.split(/\s+/).filter(w => /^[A-Z]/.test(w)).map(w => w[0].toUpperCase() + '.').slice(0, 3).join('');
    const title = (initials || 'Patient') + (type ? ' — ' + type : '');
    if (DB.events.some(e2 => e2.date === date && e2.time === time && e2.category === 'patient')) return;
    DB.events.push({ id: uid(), title, date, time, endTime: end, space: 'work', category: 'patient', location: '', notes: 'Imported from Cliniko feed.' });
    n++;
  });
  save(); render();
  if (!quiet || n) toast(n ? n + ' patient appointment' + (n > 1 ? 's' : '') + ' in ✓ — replanning around them' : 'No new appointments found in that file');
  if (n && DB.settings.apiKey) setTimeout(() => buildDayPlan(), 800);
}

/* ---------- Ask box ---------- */
function parseAskDate(q) {
  const t = todayStr(); q = q.toLowerCase();
  if (/\btoday\b|\btonight\b/.test(q)) return t;
  if (/\btomorrow\b/.test(q)) return addDaysStr(t, 1);
  const dm = q.match(/\b(\d{1,2})\/(\d{1,2})\b/);
  if (dm) return String(new Date().getFullYear()) + '-' + dm[2].padStart(2, '0') + '-' + dm[1].padStart(2, '0');
  const daym = q.match(/\b(next\s+)?(mon|tue|wed|thu|fri|sat|sun)[a-z]*\b/);
  if (daym) {
    const idx = ['sun', 'mon', 'tue', 'wed', 'thu', 'fri', 'sat'].indexOf(daym[2]);
    let diff = (idx - new Date().getDay() + 7) % 7; if (diff === 0) diff = 7;
    if (daym[1] && diff <= 2) diff += 7; /* "next tue" said on a Monday means the following week */
    return addDaysStr(t, diff);
  }
  return null;
}
function askLocal(q) {
  const ql = q.toLowerCase();
  if (/^(why|how come|explain|what went wrong)/i.test(ql)) return null; /* explanatory questions go to the smart path */
  const scheduleQ = /(am i free|free\b|busy|what.?s on|what do i have|anything (on|booked)|my (diary|schedule)|appointments?\b)/i.test(ql);
  const d = scheduleQ ? parseAskDate(ql) : null;
  const part = /evening|tonight|dinner/.test(ql) ? 'evening' : /morning/.test(ql) ? 'morning' : /afternoon/.test(ql) ? 'afternoon' : null;
  if (d) {
    let evs = DB.events.filter(e => e.date === d).sort((a, b) => (a.time || '99') < (b.time || '99') ? -1 : 1);
    if (part === 'evening') evs = evs.filter(e => e.time && e.time >= '17:00');
    if (part === 'morning') evs = evs.filter(e => !e.time || e.time < '12:00');
    if (part === 'afternoon') evs = evs.filter(e => e.time && e.time >= '12:00' && e.time < '17:00');
    const tks = DB.tasks.filter(x => x.status === 'open' && x.due === d);
    const dayName = NICE_DAY(d) + ' (' + new Date(d + 'T12:00:00').toLocaleDateString('en-GB', { day: 'numeric', month: 'long' }) + ')';
    if (!evs.length) return '<b>' + dayName + (part ? ', ' + part : '') + ':</b> nothing on your diary, you’re free ✨' + (tks.length ? '<br>Though ' + tks.length + ' task' + (tks.length > 1 ? 's are' : ' is') + ' due that day: ' + tks.map(x => esc(x.title)).join('; ') : '');
    return '<b>' + dayName + (part ? ', ' + part : '') + ':</b><br>' + evs.map(e => '• ' + (e.time ? e.time + ' · ' : '') + esc(stripId(e.title)) + (e.location ? ' (' + esc(e.location) + ')' : '')).join('<br>') + (tks.length ? '<br>Also due: ' + tks.map(x => esc(x.title)).join('; ') : '');
  }
  const when = ql.match(/when(?:'s| is| am i seeing| do i)?\s+(.+?)\??$/) || ql.match(/(?:where|what time)(?:'s| is)?\s+(.+?)\??$/);
  if (when) {
    const stop = ['my', 'the', 'a', 'is', 'appointment', 'appt', 'meeting', 'with', 'at', 'for', 'do', 'i', 'have', 'see', 'seeing', 'next'];
    const words = when[1].toLowerCase().split(/\W+/).filter(w => w.length > 1 && !stop.includes(w));
    const score = title => words.filter(w => new RegExp('\\b' + w.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + '\\b', 'i').test(title)).length;
    const evs = DB.events.filter(e => e.date >= todayStr() && score(e.title) > 0).sort((a, b) => score(b.title) - score(a.title) || (a.date < b.date ? -1 : 1));
    if (evs.length) { const ev = evs[0]; return '<b>' + esc(ev.title) + ':</b> ' + NICE_DAY(ev.date) + ' (' + new Date(ev.date + 'T12:00:00').toLocaleDateString('en-GB', { day: 'numeric', month: 'long' }) + ')' + (ev.time ? ' at ' + ev.time : '') + (ev.location ? ', ' + esc(ev.location) : ''); }
    const tks = DB.tasks.filter(x => x.status === 'open' && x.due && score(x.title) > 0).sort((a, b) => score(b.title) - score(a.title) || (a.due < b.due ? -1 : 1));
    if (tks.length) return '<b>' + esc(tks[0].title) + ':</b> due ' + NICE_DAY(tks[0].due);
  }
  if (/overdue|late|behind/.test(ql)) {
    const over = DB.tasks.filter(x => x.status === 'open' && x.due && x.due < todayStr());
    return over.length ? '<b>Catching up (' + over.length + '):</b><br>' + over.map(x => '• ' + esc(x.title)).join('<br>') : 'Nothing overdue — you’re on top of it 🎉';
  }
  return null;
}

    const res = await fetch('https://api.anthropic.com/v1/messages', {

/* ---------- Today ---------- */
function viewToday() {
  const t = todayStr();
  const open = openTasks().filter(x => x.status === 'open');
  const focus = openTasks().filter(x => x.focus && x.status !== 'done');
  const startCond = x => (x.startBy && x.startBy <= t && (!x.due || x.due > t)) || ((x.est || 0) >= 60 && x.due && x.due > t && x.due <= addDaysStr(t, 7));
  const skip = x => x.focus || x.pinned || startCond(x);
  const pinned = sortTasks(open.filter(x => !x.focus && (x.pinned || startCond(x))));
  const over = sortTasks(open.filter(x => !skip(x) && x.due && x.due < t));
  const today = sortTasks(open.filter(x => !skip(x) && x.due === t));
  const draftFirst = arr => [...arr.filter(x => x.draft), ...arr.filter(x => !x.draft)];
  let todayList = [...draftFirst(over), ...draftFirst(today)];
  const rk = (DB.dayRank && DB.dayRank.date === t) ? DB.dayRank.titles : null;
  if (rk) { const ri = x => { const i = rk.indexOf(x.title); return i < 0 ? 99 : i; }; todayList = todayList.map((x, i) => [x, i]).sort((a, b2) => (ri(a[0]) - ri(b2[0])) || (a[1] - b2[1])).map(pr => pr[0]); }
  const draftsN = open.filter(x => x.draft).length;
  const doneToday = DB.tasks.filter(x => x.status === 'done' && x.doneAt && new Date(x.doneAt).toLocaleDateString('en-CA') === t && inSpace(x));
  const est = [...focus, ...over, ...today].reduce((s, x) => s + (x.est || 0), 0);
  const dateLine = new Date().toLocaleDateString('en-GB', { weekday: 'long', day: 'numeric', month: 'long' });
  const hr = new Date().getHours();
  const greet = hr < 12 ? 'Good morning, Maude ☀️' : hr < 18 ? 'Good afternoon, Maude 🌤' : 'Good evening, Maude 🌙';
  const total = focus.length + over.length + today.length + doneToday.length;
  const pct = total ? Math.round(doneToday.length / total * 100) : 0;
  return `
  <div class="view">
    <div class="view-head">
      <div class="greet">${greet}</div>
      <div class="sub">${dateLine}</div>
      ${total ? `<div class="pbar" title="How much of today’s list is done"><div style="width:${pct}%${pct >= 100 ? ';background:linear-gradient(140deg,#fce491,#eebb35,#c98f1b)' : ''}"></div></div><div class="pbar-lbl">${doneToday.length} of ${total} done today${pct >= 100 ? ' — all clear! 🎉' : ''}</div>` : ''}
      ${draftsN ? `<div class="pbar-lbl" title="Wherever you see a purple ‘Draft ready’ button, the reply is written — copy, paste, send">✉️ ${draftsN} repl${draftsN === 1 ? 'y is' : 'ies are'} drafted and ready — look for the purple buttons</div>` : ''}
      <div style="margin-top:12px;display:flex;gap:8px"><button class="chip c-date on" data-act="dp-rank" title="Three quick piles — Must, Should, Can wait — then your diary builds around them">🎯 Rank &amp; slot</button><button class="chip" data-act="plan-day" title="Skip the ranking — the planner decides and builds the day">🪄 Just plan it</button></div>
      ${est ? `<div class="timebudget" title="Research says ADHD brains underestimate by ~50%, so both numbers are shown">Today adds up to <b>${fmtEst(est)}</b> on paper — realistically <b>${fmtEst(Math.round(est * 1.5))}</b> with breathing room. If that’s more than your day, snooze something guilt-free.</div>` : ''}
    </div>
    ${briefHTML()}
    ${quickAddHTML('Add a task, or ask me anything…', true)}
    <div id="ask-out" style="display:none;margin:-14px 0 20px;padding:12px 14px;background:var(--personal-soft);border-radius:12px;font-size:.9rem;line-height:1.5"></div>
    <div class="focus-wrap">
      <div class="sec-h"><h2>🎯 Focus — max 3</h2></div>
      ${focus.length ? `<div class="cardlist">${focus.map(x => taskCard(x, { focusCard: true })).join('')}</div>`
      : `<div style="display:flex;gap:8px;flex-wrap:wrap"><button class="pickme" style="flex:1;min-width:200px" data-act="pickme" title="One reasoned recommendation, with its why">🧠 Smart pick — with reasons</button>${DB.settings.fxWheel !== false ? `<button class="pickme" style="flex:1;min-width:200px" data-act="wheel-open" title="No reasons, pure fate — and you’re allowed to blame it">🎡 Chaos wheel</button>` : ""}</div>`}
      <div class="focus-note">One thing at a time. Target up to 3 — everything else waits its turn.</div>
    </div>
    ${pinned.length ? `<div class="sec">
      <div class="sec-h"><h2>📌 Keep in sight</h2><span class="n">pinned &amp; big things to start early</span></div>

    })()}
  </div>`;

function pickForMe() {
  const t = todayStr();
  const cands = sortTasks(openTasks().filter(x => x.status === 'open' && !x.focus));
  const pick = cands.find(x => x.due && x.due <= t) || cands[0];
  if (!pick) { toast('Nothing to pick — your list is clear! 🎉'); return; }
  const reasons = [];
  if (pick.due && pick.due < t) { const days = Math.round((new Date(t) - new Date(pick.due)) / 864e5); reasons.push('it is ' + days + ' day' + (days > 1 ? 's' : '') + ' overdue — oldest debt first'); }
  else if (pick.due === t) reasons.push('it is due today');
  if (pick.priority === 'high') reasons.push('you marked it high priority');
  if (DB.dayRank && DB.dayRank.date === t && DB.dayRank.titles[0] === pick.title) reasons.push('you put it top of your Must pile this morning');
  if (pick.draft) reasons.push('the reply is already drafted — this is a 2-minute win');
  if ((pick.est || 20) <= 15) reasons.push('it is only ~' + (pick.est || 15) + ' minutes — momentum fuel');
  if (!reasons.length) reasons.push('it is simply next in line by deadline');
  $('#modal-root').innerHTML = `
  <div class="modal-bg" data-act="modal-bg"><div class="modal" style="max-width:440px">
    <h3>🧠 Smart pick</h3>
    <p style="font-size:1.05rem;font-weight:700;margin-bottom:10px">${esc(pick.title)}</p>
    <div style="font-size:.88rem;color:var(--ink-soft);line-height:1.6;margin-bottom:16px">Why this one:<br>${reasons.map(r => '• ' + esc(r)).join('<br>')}</div>
    <div class="modal-actions">
      <button class="btn-primary" data-act="pick-accept" data-title="${esc(pick.title)}">🎯 Focus it</button>
      ${DB.settings.fxWheel !== false ? '<button class="btn-ghost" data-act="wheel-open" title="Reject reason, embrace chaos">🎡 Wheel instead</button>' : ''}
      <button class="btn-ghost" data-act="modal-close">Not now</button>
    </div>
  </div></div>`;
}

let MREC = null, MCHUNKS = [];
async function toggleStudioRec(btn) {
  if (MREC) { MREC.stop(); return; }

  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    MCHUNKS = [];
    MREC = new MediaRecorder(stream);
    MREC.ondataavailable = e => { if (e.data.size) MCHUNKS.push(e.data); };
    MREC.onstop = async () => {
      stream.getTracks().forEach(tr => tr.stop());
      const blob = new Blob(MCHUNKS, { type: MREC.mimeType || 'audio/webm' });
      MREC = null;
      document.querySelectorAll('[data-act=cn-rec]').forEach(x => { x.classList.remove('on', 'c-high'); x.textContent = '⏺ Studio record'; });

        fd.append('model', 'whisper-1');
        fd.append('language', 'en');
        fd.append('prompt', LEXICON.slice(0, 850));
        const r = await fetch('https://api.openai.com/v1/audio/transcriptions', { method: 'POST', headers: { 'Authorization': 'Bearer ' + DB.settings.oaiKey }, body: fd });

/* ---------- All / Waiting / Done ---------- */
function viewAll() {
  const tags = [...new Set(DB.tasks.filter(x => x.tag && x.status !== 'done').map(x => x.tag))];
  let list = openTasks();
  if (searchQ) list = list.filter(x => (x.title + ' ' + x.notes + ' ' + x.tag).toLowerCase().includes(searchQ.toLowerCase()));
  if (tagFilter) list = list.filter(x => x.tag === tagFilter);
  list = sortTasks(list);
  return `${quickAddHTML()}
    <div class="filterbar">
      <input type="search" id="search-input" placeholder="Search tasks…" value="${esc(searchQ)}">
      <div class="tagchips">${tags.map(tg => `<button class="chip c-date ${tagFilter === tg ? 'on' : ''}" data-act="tagf" data-v="${esc(tg)}">#${esc(tg)}</button>`).join('')}</div>

function viewWaiting() {
  const list = sortTasks(DB.tasks.filter(x => x.status === 'waiting' && inSpace(x)));
  return `<div class="cardlist">${list.length ? list.map(x => taskCard(x)).join('') : '<div class="empty"><span class="big">⏳</span>You’re not waiting on anyone.</div>'}</div>`;

function viewDone() {
  const list = DB.tasks.filter(x => x.status === 'done' && inSpace(x)).sort((a, b) => (b.doneAt || 0) - (a.doneAt || 0)).slice(0, 100);
  const groups = {};
  list.forEach(x => { const d = new Date(x.doneAt || x.createdAt).toLocaleDateString('en-CA'); (groups[d] = groups[d] || []).push(x); });
  return Object.keys(groups).map(d => section(NICE_DAY(d), groups[d])).join('') || '<div class="empty">Nothing completed yet — the first tick feels great.</div>';

function viewTasks() {

/* ---------- Calendar ---------- */
function eventCard(e) {
  return `<div class="event ${e.space}" data-act="edit-event" data-id="${e.id}" style="cursor:pointer">
    <div class="ev-bar"></div>
    <div class="ev-time">${e.time ? esc(e.time) + (e.endTime ? '–' + esc(e.endTime) : '') : 'All day'}</div>
    <div class="ev-body">
      <div class="ev-title">${esc(stripId(e.title))}</div>
      <div class="ev-sub">${e.category !== 'work' ? '<b>' + esc(cap(e.category)) + '</b> · ' : ''}${e.space === 'work' ? 'Work' : 'Personal'}${e.location ? ' · ' + esc(e.location) : ''}${e.notes ? ' — ' + esc(e.notes) : ''}</div>
    </div>
  </div>`;
}
const cap = s => s.charAt(0).toUpperCase() + s.slice(1);
function viewCalendar() {
  const first = new Date(CAL.y, CAL.m, 1);
  const label = first.toLocaleDateString('en-GB', { month: 'long', year: 'numeric' });
  const startDow = (first.getDay() + 6) % 7; // Monday first
  const daysIn = new Date(CAL.y, CAL.m + 1, 0).getDate();
  const t = todayStr();
  const cells = [];
  for (let i = 0; i < startDow; i++) {
    const d = new Date(CAL.y, CAL.m, i - startDow + 1).toLocaleDateString('en-CA');
    cells.push({ d, dim: true });
  }
  for (let i = 1; i <= daysIn; i++) cells.push({ d: new Date(CAL.y, CAL.m, i).toLocaleDateString('en-CA'), dim: false });
  while (cells.length % 7) { const last = cells[cells.length - 1].d; cells.push({ d: addDaysStr(last, 1), dim: true }); }
  const itemsFor = d => {
    const evs = DB.events.filter(e => e.date === d && (DB.settings.space === 'all' || e.space === DB.settings.space)).sort((a, b) => (a.time || '99') < (b.time || '99') ? -1 : 1);
    const tks = openTasks().filter(x => x.status === 'open' && x.due === d);
    return { evs, tks };
  };
  const grid = cells.map(c => {
    const { evs, tks } = itemsFor(c.d);
    const lines = [...evs.map(e => `<div class="cal-it ev-${e.space}">${e.time ? esc(e.time) + ' ' : ''}${esc(stripId(e.title))}</div>`),
                   ...tks.map(x => `<div class="cal-it ev-task">○ ${esc(x.title)}</div>`)];
    const shown = lines.slice(0, 3);
    const more = lines.length - shown.length;
    return `<div class="cal-cell ${c.dim ? 'dim' : ''} ${c.d === t ? 'today' : ''} ${c.d === CAL.sel ? 'sel' : ''}" data-act="cal-day" data-v="${c.d}" title="Click to see this day’s events and tasks below the calendar">
      <div class="cal-d">${+c.d.slice(8)}</div>${shown.join('')}${more > 0 ? `<div class="cal-more">+${more} more</div>` : ''}</div>`;
  }).join('');
  const { evs, tks } = itemsFor(CAL.sel);
  return `<div class="cal-top">
      <h2>${label}</h2>
      <div class="cal-nav">
        <button data-act="cal-prev" title="Previous month">‹</button><button data-act="cal-today" title="Jump back to this month">Today</button><button data-act="cal-next" title="Next month">›</button>
      </div>
      <button class="cal-add" style="background:var(--panel);color:var(--ink);border:1px solid var(--line);margin-left:auto" data-act="cal-ics" title="Downloads a calendar file — open it and Apple Calendar adds every event and deadline, with proper iPhone notifications">⬇ To Apple Calendar</button>
      <button class="cal-add" style="margin-left:8px" data-act="new-event" title="Put something on the selected day">+ Add event</button>
    </div>
    <div class="cal-grid">
      ${['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'].map(d => `<div class="cal-dow">${d}</div>`).join('')}
      ${grid}
    </div>
    <div class="daypanel">
      <div class="sec-h"><h2>${NICE_DAY(CAL.sel)}</h2></div>
      <div class="cardlist">
        ${evs.map(eventCard).join('')}
        ${sortTasks(tks).map(x => taskCard(x)).join('')}
        ${!evs.length && !tks.length ? '<div class="empty">Nothing on this day — tap “+ Add event” to put something here.</div>' : ''}
      </div>
    </div>`;
}

  const data = {

/* ---------- dictation ---------- */
let REC = null;
function toggleDictation(targetSel, btn) {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { toast(/iphone|ipad/i.test(navigator.userAgent) ? 'On iPhone, tap the box and use the 🎙 on your keyboard — it’s built in.' : 'Dictation needs Chrome on this Mac (Safari doesn’t support it here).'); return; }
  if (REC) { REC.stop(); return; }
  const ta = $(targetSel); if (!ta) return;
  REC = new SR(); REC.lang = 'en-GB'; REC.continuous = true; REC.interimResults = false;
  REC.onresult = e => { for (let i = e.resultIndex; i < e.results.length; i++) if (e.results[i].isFinal) { ta.value = (ta.value ? ta.value.trimEnd() + ' ' : '') + e.results[i][0].transcript.trim(); } };
  REC.onend = () => { REC = null; document.querySelectorAll('[data-act=dictate]').forEach(x => { x.classList.remove('on', 'c-high'); x.textContent = '🎙 Dictate'; }); if (targetSel === '#cn-ta' && DB.settings.apiKey && ta.value.trim().length > 40) cleanTranscript(); };
  REC.onerror = ev => { if (ev.error === 'not-allowed') toast('Chrome needs microphone permission — click the 🎙 icon in the address bar and allow it.'); };
  REC.start();
  if (btn) { btn.classList.add('on', 'c-high'); btn.textContent = '⏺ Listening… click to stop'; }
  toast('Listening — speak away, click the button again when done');
}

/* ---------- Apple Calendar export ---------- */
function exportICS() {
  const icsEsc = x => String(x || '').replace(/\\/g, '\\\\').replace(/;/g, '\\;').replace(/,/g, '\\,').replace(/\n/g, '\\n');
  const d8 = d => d.replace(/-/g, '');
  const t = todayStr();
  const L = ['BEGIN:VCALENDAR', 'VERSION:2.0', 'PRODID:-//MaudeHQ//EN', 'CALSCALE:GREGORIAN', 'X-WR-CALNAME:Maude HQ'];
  DB.events.filter(e => e.date >= t).forEach(e => {
    L.push('BEGIN:VEVENT', 'UID:' + e.id + '@maudehq', 'DTSTAMP:' + d8(t) + 'T000000');
    if (e.time) {
      const plus1h = tm => { const [h, m] = tm.split(':').map(Number); return String(Math.min(h + 1, 23)).padStart(2, '0') + String(m).padStart(2, '0'); };
      L.push('DTSTART:' + d8(e.date) + 'T' + e.time.replace(':', '') + '00');
      L.push('DTEND:' + d8(e.date) + 'T' + (e.endTime ? e.endTime.replace(':', '') : plus1h(e.time)) + '00');
      L.push('BEGIN:VALARM', 'ACTION:DISPLAY', 'DESCRIPTION:' + icsEsc(stripId(e.title)), 'TRIGGER:-PT1H', 'END:VALARM');
    } else L.push('DTSTART;VALUE=DATE:' + d8(e.date));
    L.push('SUMMARY:' + icsEsc(stripId(e.title)));
    if (e.location) L.push('LOCATION:' + icsEsc(e.location));
    L.push('END:VEVENT');
  });
  DB.tasks.filter(x => x.status === 'open' && x.due && x.due >= t).forEach(x => {
    L.push('BEGIN:VEVENT', 'UID:' + x.id + '@maudehq', 'DTSTAMP:' + d8(t) + 'T000000',
      'DTSTART;VALUE=DATE:' + d8(x.due), 'SUMMARY:' + icsEsc('⚑ ' + x.title + ' (due)'), 'END:VEVENT');
  });
  L.push('END:VCALENDAR');
  const blob = new Blob([L.join('\r\n')], { type: 'text/calendar' });
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
  a.download = 'maude-hq.ics'; a.click(); URL.revokeObjectURL(a.href);
  toast('Downloaded — open the file and Apple Calendar takes it from there');
}

function routeFile(f) {
  if (window._importMode === 'note' || (/\.(txt|vtt|srt)$/i.test(f.name) && DB.settings.route === 'notes')) {
    fileToText(f, txt => { const ta = $('#cn-ta'); if (ta) { ta.value = txt.replace(/^WEBVTT[\s\S]*?\n\n/, ''); toast('Transcript in — hit 🩺 Write the note'); } });
  } else if (/\.(txt|md)$/i.test(f.name) && DB.settings.route === 'drop') {
    fileToText(f, txt => { const ta = $('#dz-ta'); if (ta) { ta.value = txt; toast('In the Drop zone — hit ✨ Sort it for me'); } });
  } else if (window._importMode === 'ics' || /\.ics$/i.test(f.name)) {
    fileToText(f, importICSText);
  } else if (/\.(txt|vtt|srt|md)$/i.test(f.name)) {
    fileToText(f, txt => { DB.settings.route = 'notes'; save(); render(); const ta = $('#cn-ta'); if (ta) { ta.value = txt.replace(/^WEBVTT[\s\S]*?\n\n/, ''); toast('Transcript opened in Notes — hit 🩺 Write the note'); } });
  } else (window._importMode === 'drafts' ? importDraftPack : importData)(f);
}
$('#import-file').addEventListener('change', e => {
  if (e.target.files[0]) routeFile(e.target.files[0]);
  e.target.value = ''; window._importMode = '';
});
document.addEventListener('click', e => {
  const card = e.target.closest('.bk-card'); if (!card || !window._buckets || card.classList.contains('bk-ghost')) return;
  const ti = card.dataset.bkTitle;
  const cur = window._buckets[ti];
  window._buckets[ti] = cur === 3 ? 0 : (cur + 1) % 3 === 0 ? 3 : (cur + 1);
  const wrap = $('#bk-wrap'); if (wrap) wrap.innerHTML = renderRankBody();
});
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });
document.addEventListener('input', e => { const id = e.target && e.target.id; if (id === 'cn-ta') window._cnDraft = e.target.value; if (id === 'cn-hx') window._cnHx = e.target.value; if (id === 'cn-age') window._cnAge = e.target.value; if (id === 'cn-init') window._cnInitV = e.target.value; });
document.addEventListener('change', e => { const id = e.target && e.target.id; if (id === 'cn-tx') window._cnTx = e.target.checked; if (id === 'cn-rx') window._cnRx = e.target.checked; });

load(); render();
/* live clock, top right */
(() => {
  const c = document.createElement('div'); c.id = 'clock'; document.body.appendChild(c);
  const tick = () => {
    const n = new Date();
    const td = todayStr();
    const doneDays = {};
    DB.tasks.forEach(x => { if (x.status === 'done' && x.doneAt) doneDays[new Date(x.doneAt).toLocaleDateString('en-CA')] = true; });
    const starsToday = DB.tasks.filter(x => x.status === 'done' && x.doneAt && new Date(x.doneAt).toLocaleDateString('en-CA') === td).length;
    let streak = 0, cursor = doneDays[td] ? td : addDaysStr(td, -1);
    while (doneDays[cursor]) { streak++; cursor = addDaysStr(cursor, -1); }
    c.innerHTML = '<div class="c-t">' + String(n.getHours()).padStart(2, '0') + ':' + String(n.getMinutes()).padStart(2, '0') + '</div><div class="c-d">' + n.toLocaleDateString('en-GB', { weekday: 'short', day: 'numeric', month: 'short' }) + '</div><div class="c-s" title="Stars earned today' + (streak >= 2 ? ' · your streak: days in a row with at least one star — don’t break the chain' : '') + '">★ ' + starsToday + ' today' + (streak >= 2 ? ' · 🔥 ' + streak + '-day streak' : '') + (DB.settings.fxGame !== false && starsToday >= (DB.settings.starGoal || 5) ? ' <button data-act="game-open" style="pointer-events:auto;cursor:pointer;font-size:1rem" title="Star goal hit — your daily game is unlocked">🎁</button>' : '') + '</div>';
  };
  window._ctick = tick; tick(); setInterval(tick, 15000);
})();
/* Once-a-day check-in: offer to load Claude's updates before anything else */
if (DB.settings.lastUpdatePrompt !== todayStr()) {
  DB.settings.lastUpdatePrompt = todayStr();
  DB.settings.route = DB.settings.homeRoute || 'today'; /* fresh day starts on your chosen home screen */
  save(); render();
  $('#modal-root').innerHTML = `
  <div class="modal-bg">
    <div class="modal" style="max-width:440px;text-align:center">
      <div style="font-size:2rem;margin-bottom:8px">☀️</div>
      <h3 style="margin-bottom:8px">First things first</h3>
      <p style="color:var(--ink-soft);font-size:.92rem;line-height:1.5;margin-bottom:18px">If Claude has updates for you, load them now. Then, if you like, tap 🎯 on up to three tasks YOU know matter most today — the day plan schedules your picks first. No picks is fine too; the plan decides.</p>
      <div class="modal-actions" style="justify-content:center">
        <button class="btn-primary" data-act="import-drafts" onclick="document.querySelector('.modal-bg').remove()">⇪ Load today’s updates</button>
        <button class="btn-ghost" data-act="modal-close">Nothing to load</button>
      </div>
    </div>
  </div>`;
}
/* Auto-build the day plan once each day, quietly in the background */
if (DB.settings.apiKey && (DB.settings.dpAutoDate !== todayStr() || !dayplanToday().blocks.some(b => b.type === 'task' && !b.done && !b.cancelled))) {
  if (DB.settings.dpAutoDate !== todayStr() || !dayplanToday().blocks.some(b => b.type === 'task' && !b.done && !b.cancelled)) { DB.settings.dpAutoDate = todayStr(); save(); setTimeout(() => buildDayPlan(), 2500); }
}
if (!DB.settings.people) { DB.settings.people = PEOPLE_DEFAULT; localStorage.setItem(LS_KEY, JSON.stringify(DB)); }
if (!DB.settings.evclean1) { /* one-time: merge duplicate appointment slots, move client numbers out of titles */
  const bySlot = {};
  const cleaned = [];
  const evs = DB.events.slice().sort((a, b) => a.title.length - b.title.length);
  for (const e of evs) {
    const num = String(e.title).match(/\d{3,}/);
    const key = e.date + '|' + (e.time || '');
    if (num) { const st = scrubEvTitle(e.title); if (st) e.title = st; if (!(e.notes || '').includes(num[0])) e.notes = ((e.notes ? e.notes + ' ' : '') + 'Client #' + num[0]).trim(); }
    if (e.time && bySlot[key] && (e.category === 'patient' || bySlot[key].category === 'patient' || num)) {
      const kpt = bySlot[key];
      if (num && !(kpt.notes || '').includes(num[0])) kpt.notes = ((kpt.notes ? kpt.notes + ' ' : '') + 'Client #' + num[0]).trim();
      continue; /* duplicate slot absorbed */
    }
    if (e.time) bySlot[key] = e;
    cleaned.push(e);
  }
  DB.events = cleaned;
  DB.settings.evclean1 = true; localStorage.setItem(LS_KEY, JSON.stringify(DB));
} /* people notes live in settings so they sync between devices */
/* captures arriving from the Send-to-Maude-HQ extension (hash or same-tab message) */
function applyCapture(p) {
  if (!p || !p.text) return;
  if (/Maude HQ/i.test(p.source || '') || /^\s*Maude HQ\s*\n\s*All\s*\n\s*Work/.test(p.text)) { toast('That was the app capturing itself — ignored. Use 🧹 Sweep now instead.'); return; }
  const prevTa = $('#dz-ta'); const prev = prevTa ? prevTa.value : ''; /* read BEFORE render wipes the box */
  DB.settings.route = 'drop'; save(); render();
  const ta = $('#dz-ta');
  if (!ta) return;
  const stamp = 'Captured from ' + (p.source || 'a page') + ' at ' + new Date(p.at || Date.now()).toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' }) + ':\n\n' + p.text;
  ta.value = prev.trim() ? prev.trimEnd() + '\n\n════════════\n\n' + stamp : stamp; /* captures pile up, one approval for the lot */
  const schedSort = ms => { clearTimeout(window._capT); if (DB.settings.apiKey) window._capT = setTimeout(() => dropSort(), ms); };
  /* Mac Mail arrived and the sweep engine is connected: grab the web sources too, then sort everything together */
  if (/Mac Mail/i.test(p.source || '') && document.body.classList.contains('has-ext')) {
    toast('📥 Mail + Calendar in — also sweeping work email, WhatsApp and diary…');
    window.postMessage({ mhqCmd: 'sweep', feeds: (DB.settings.icsFeeds || '').split('\n').map(x => x.trim()).filter(Boolean) }, '*');
    schedSort(60000); /* fallback: sort what we have if the sweep never comes back */
  } else {
    toast('📥 Captured — sorting it out…');
    schedSort(2500);
  }
}
(function () {
  if (!location.hash) return;
  if (location.hash.startsWith('#mhqu=')) { /* structured updates from the scheduled sweeps: file straight in */
    let raw = null;
    try { raw = decodeURIComponent(location.hash.slice(6)); } catch (e) {}
    try { history.replaceState(null, '', location.pathname + location.search); } catch (e) {}
    if (raw) { DB.settings.lastSweepAt = Date.now(); DB.settings.lastFullSweepAt = Date.now(); applyUpdatesText(raw); }
    return;
  }
  if (!location.hash.startsWith('#mhq=')) return;
  let p = null;
  try { p = JSON.parse(decodeURIComponent(location.hash.slice(5))); } catch (e) {}
  try { history.replaceState(null, '', location.pathname + location.search); } catch (e) {}
  applyCapture(p);
})();
window.addEventListener('message', e => {
  if (e.source !== window || !e.data) return;
  if (e.data.mhqExtensionReady) document.body.classList.add('has-ext');
  if (e.data.mhqResult) {
    const b = $('#ext-sweep-btn'); if (b) { b.style.opacity = ''; }
    DB.settings.lastSweepAt = Date.now(); save();
    applyCapture(e.data.mhqResult);
  }
});
setTimeout(() => window.postMessage({ mhqCmd: 'ping' }, '*'), 1200);
setTimeout(() => window.postMessage({ mhqCmd: 'ping' }, '*'), 4000);
/* the assistant checks by itself: quiet sweep on open if nothing has arrived for 3+ hours */
setTimeout(() => {
  if (DB.settings.autoSweep === false) return;
  if (!document.body.classList.contains('has-ext') || !DB.settings.apiKey) return;
  if (DB.settings.lastSweepAt && Date.now() - DB.settings.lastSweepAt < 3 * 3600e3) return;
  toast('🧹 Quietly checking your inboxes and diary…');
  window.postMessage({ mhqCmd: 'sweep', feeds: (DB.settings.icsFeeds || '').split('\n').map(x => x.trim()).filter(Boolean) }, '*');
}, 5000);
if (DB.settings.ghToken) { syncPull(); setInterval(syncPull, 120000); }
document.addEventListener('visibilitychange', () => { if (!document.hidden && DB.settings.ghToken) syncPull(); });

</script>
</body>
